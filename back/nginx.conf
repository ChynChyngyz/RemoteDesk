# Запускаем от непривилегированного пользователя для безопасности
user nginx;
worker_processes auto; # Оптимизация под количество ядер

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Оптимизации производительности
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens   off; # Скрывает версию nginx в заголовках

    # Настройки Gzip Compression (снижает объем передаваемого трафика)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Балансировщик для бекэнда
    upstream backend_servers {
        server backend:8000;
    }

    server {
        listen 80;
        server_name _; # Обработка любых доменов, если не указан конкретный

        # Security Headers (защита от XSS, clickjacking и др.)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Роутинг статики и медиа (убедитесь, что collectstatic выполнен)
        location /static/ {
            alias /app/static/;
            expires 30d;
            access_log off;
        }

        location /media/ {
            alias /app/media/;
            expires 30d;
            access_log off;
        }

        # Стандартные REST API запросы
        location / {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        # Отдельный location для WebSockets (Django Channels)
        location /ws/ {
            proxy_pass http://backend_servers;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;

            # Увеличиваем таймауты, чтобы WebSockets не отключались из-за бездействия
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }
    }
}